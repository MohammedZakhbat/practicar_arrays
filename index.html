<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./output.css" />
  <title>Practicar Arrays</title>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-900 to-purple-900 p-4">

  <div class="w-full max-w-xl bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-6 sm:p-8">

    <div class="text-center">

      <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2">
        📚 Practicar Arrays
      </h1>

      <p class="text-white/80 text-sm sm:text-base mb-8">
  Navega para descubrir más animales
</p>

    </div>

    <div class="bg-white/10 border border-white/10 rounded-2xl p-6 sm:p-8 mb-6 text-center min-h-[220px] flex flex-col justify-center">

      <p id="content"
        class="text-white text-xl sm:text-2xl italic leading-relaxed mb-5 break-words">
      </p>

      <p id="author"
        class="text-indigo-200 font-semibold text-sm sm:text-base">
      </p>

    </div>

    <div class="flex gap-4">
      <button onclick="decrease()"
       class="w-1/2 py-4 rounded-2xl bg-white/20 text-white font-semibold hover:bg-indigo-400 hover:scale-105 active:scale-95 transition-all duration-200 shadow-lg">

        <div class="text-2xl mb-1">⬅</div>

        <div class="font-semibold">
          Anterior
        </div>

        <p class="text-xs opacity-70">
          Volver atrás
        </p>

      </button>
      <button onclick="increase()"
        class="w-1/2 py-4 rounded-2xl bg-white/20 text-white font-semibold hover:bg-indigo-400 hover:scale-105 active:scale-95 transition-all duration-200 shadow-lg">

        <div class="text-2xl mb-1">➡</div>

        <div class="font-semibold">
          Siguiente
        </div>

        <p class="text-xs opacity-80">
            Descubrir más
        </p>

      </button>

      

      

    </div>

  </div>

  <script src="./app.js"></script>

</body>

</html>
