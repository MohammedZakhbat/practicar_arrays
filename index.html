<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./output.css">
  <title>Pratiquer Arrays</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg text-center max-w-xl w-full">
    
    <h1 class="text-2xl font-bold mb-6">Pratiquer Arrays</h1>

    
    <p id="content" class="text-lg text-blue-700 italic mb-2"></p>
    <p id="author" class="text-gray-500 mb-6"></p>

    
    <div class="flex justify-between gap-4">
      <button onclick="decrease()"
        class="w-1/2 bg-gray-300 hover:bg-gray-400 p-4 rounded-xl">
        <strong>Diminuer</strong><br>
        <span class="text-sm">Cita anterior</span>
      </button>

      <button onclick="increase()"
        class="w-1/2 bg-gray-300 hover:bg-gray-400 p-4 rounded-xl">
        <strong>Aumentar</strong><br>
        <span class="text-sm">Cita siguiente</span>
      </button>
    </div>

  </div>

 <script src="app.js"></script>

</body>
</html>
