<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./output.css">
  <title>Pratiquer Arrays</title>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-900 to-purple-900">

  <div class="backdrop-blur-xl bg-white/10 border border-white/20 shadow-2xl rounded-3xl p-10 max-w-xl w-full text-center">

    <h1 class="text-3xl font-bold text-white mb-6 tracking-wide">
      📚 Pratiquer Arrays
    </h1>

    
    <div class="bg-white/10 rounded-2xl p-6 mb-8 border border-white/10">
      <p id="content" class="text-xl text-white italic leading-relaxed mb-4 transition-all duration-300"></p>
      <p id="author" class="text-indigo-200 font-semibold"></p>
    </div>

   
    <div class="flex gap-4">

      <button onclick="decrease()"
        class="w-1/2 py-4 rounded-2xl bg-white/20 text-white font-semibold
               hover:bg-white/30 hover:scale-105 active:scale-95
               transition-all duration-200 shadow-lg">
        ⬅ Diminuer
        <p class="text-xs opacity-80">Cita anterior</p>
      </button>

      <button onclick="increase()"
        class="w-1/2 py-4 rounded-2xl bg-indigo-500 text-white font-semibold
               hover:bg-indigo-400 hover:scale-105 active:scale-95
               transition-all duration-200 shadow-lg">
        ➡ Aumentar
        <p class="text-xs opacity-80">Cita siguiente</p>
      </button>

    </div>

  </div>

  <script src="./app.js"></script>

</body>
</html>
